<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradientes -->
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <linearGradient id="lightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e5e7eb" />
      <stop offset="100%" stop-color="#9ca3af" />
    </linearGradient>
  </defs>

  <!-- Banco de dados -->
  <ellipse cx="150" cy="260" rx="80" ry="25" fill="url(#blueGrad)" />
  <rect x="70" y="260" width="160" height="90" fill="url(#blueGrad)" />
  <ellipse cx="150" cy="350" rx="80" ry="25" fill="url(#blueGrad)" />

  <!-- Tabela -->
  <rect x="200" y="140" width="180" height="200" rx="12" fill="#f3f4f6" stroke="#cbd5f5" />
  <rect x="200" y="140" width="180" height="40" rx="12" fill="url(#blueGrad)" />

  <!-- Linhas da tabela -->
  <g stroke="#d1d5db">
    <line x1="200" y1="200" x2="380" y2="200" />
    <line x1="200" y1="240" x2="380" y2="240" />
    <line x1="200" y1="280" x2="380" y2="280" />
  </g>

  <!-- Células verdes -->
  <rect x="240" y="210" width="60" height="20" fill="#22c55e" />
  <rect x="280" y="250" width="60" height="20" fill="#22c55e" />

  <!-- Lupa -->
  <circle cx="360" cy="300" r="70" fill="url(#lightGrad)" stroke="#334155" stroke-width="6" />
  <circle cx="360" cy="300" r="55" fill="#e5e7eb" />

  <!-- Gráfico -->
  <polyline points="320,320 350,300 380,310 410,280" fill="none" stroke="#1e293b" stroke-width="5" />

  <!-- Cabo da lupa -->
  <rect x="400" y="350" width="70" height="20" rx="10" transform="rotate(45 400 350)" fill="url(#blueGrad)" />

  <!-- Base DBC -->
  <rect x="180" y="380" width="200" height="60" rx="30" fill="url(#darkGrad)" />

  <text x="280" y="420" font-size="40" fill="#e5e7eb" text-anchor="middle" font-family="Arial, sans-serif"
    font-weight="bold">
    DBC
  </text>

</svg>
